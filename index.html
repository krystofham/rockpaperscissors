<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper scissors</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <h1>Rock paper scissors</h1>
<table class="scoreboard">
    <thead>
        <tr>
            <th colspan="3">AKTUÁLNÍ SKÓRE</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="team-name">ROBOT</td>
            <td class="score-cell">
                <span id="scorebot">0</span> : <span id="scoreply">0</span>
            </td>
            <td class="team-name">HRÁČ</td>
        </tr>
        <tr>
            <td>
                <div class="choicePC choice">
                    <i class="fa-regular fa-hand-scissors fa-5x" id="PC0" style="display: none;"></i>
                    <i class="fa-regular fa-hand-paper fa-5x" id="PC1"style="display: none;"></i>
                    <i class="fa-regular fa-hand-rock fa-5x" id="PC2"style="display: none;"></i>
                </div>
            </td>
            <td></td>
            <td>
                <div class="choicePLAYER choice">
                    <i class="fa-regular fa-hand-scissors fa-5x" id="RES-PL0" style="display: none;"></i>
                    <i class="fa-regular fa-hand-paper fa-5x" id="RES-PL1"style="display: none;"></i>
                    <i class="fa-regular fa-hand-rock fa-5x" id="RES-PL2"style="display: none;"></i>
                </div>
            </td>
        </tr>
    </tbody>
</table>    
<main>
    <h2>Vyber si</h2>
    <div class="pick">
        <button class="P0">
            <i class="pick fa-regular fa-hand-scissors fa-5x" id="PL0" class="choice"></i>
        </button>
        <button class="P1">
            <i class="pick fa-regular fa-hand-paper fa-5x"id="PL1" class="choice"></i>
        </button>
        <button class="P2">
            <i class="pick fa-regular fa-hand-rock fa-5x" id="PL2"class="choice"></i>
        </button>
    </div>
    <div class="verdikt">Klikni na tlačítko!</div>
    </main>
    <script src="script.js"></script>
</body>
</html>
