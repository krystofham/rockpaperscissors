<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock paper scissors</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <h1>Rock paper scissors</h1>
<table class="scoreboard">
    <thead>
        <tr>
            <th colspan="3">AKTUÁLNÍ SKÓRE</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td class="team-name">ROBOT</td>
            <td class="score-cell">
                <span id="scorebot">0</span> : <span id="scoreply">0</span>
            </td>
            <td class="team-name">HRÁČ</td>
        </tr>
    </tbody>
</table>    <main>
    <button class="start">Play game</button>
    <div class="choices">
        <h2>PC choise</h2>
        <div class="choicePC choice">
            <i class="fa-regular fa-hand-scissors fa-5x" id="PC0"></i>
            <i class="fa-regular fa-hand-paper fa-5x" id="PC1"></i>
            <i class="fa-regular fa-hand-rock fa-5x" id="PC2"></i>
        </div>

        <h2>You</h2>

        <div class="choicePLAYER choice">
            <i class="fa-regular fa-hand-scissors fa-5x" id="PL0"></i>
            <i class="fa-regular fa-hand-paper fa-5x" id="PL1"></i>
            <i class="fa-regular fa-hand-rock fa-5x" id="PL2"></i>
        </div>
    </div>
    <div class="verdikt">
    </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
